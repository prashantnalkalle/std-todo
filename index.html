<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./assests/css/style.css">
</head>
<body>
  <header class="header">
    <h1>Student Todo</h1>
  </header>
  <div class="container-fluid mt-5">
    <div class="row">
      <div class="col-md-4">
        <div class="card">
          <div class="card-body">
            <form action="" id="studentform">
              <div class="form-group">
                <label for="First name" class="">First Name</label>
                <input type="text" class="form-control" id="fname">
              </div>
              <div class="form-group">
                <label for="Last Name" class="">Last Name</label>
                <input type="text" class="form-control" id="lname">
              </div>
              <div class="form-group">
                <label for="Email" class="">Email</label>
                <input type="text" class="form-control" id="email">
              </div>
              <div class="form-group">
                <label for="Contact" class="">Contact</label>
                <input type="text" class="form-control" id="contact">
              </div>

              <button class="btn btn-primary btn-sm btn-block" id="Addtodo"> Add Student Info</button>
              <button type="button" class="btn btn-primary btn-sm btn-block d-none" id="updatetodo"> Update Student Info</button>


            </form>
          </div>
        </div>
      </div>
      <div class="col-md-8">
        <div class="card">
          <div class="card-body">
            <table class="table table-bordered m-0" id="stdtable">
              <thead id="tablehead">
                <th>Sr.no</th>
                <th>Full name</th>
                <th>Email</th>
                <th>Contact</th>
                <th>Edit</th>
                <th>Remove</th>
              </thead>
              <tbody id="tablebody">
              
              </tbody>
              
            </table>
              <p class="alert alert-primary d-none" id="nostudent">No Student Data Found !!!</p>

          </div>
        </div>
      </div>
    </div>
  </div>
 <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="./assests/js/app.js"></script>
</body>
</html>
